version: "3.9"

services:
  kundali:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      NODE_ENV: production
    # If you add a PostgreSQL database later, uncomment:
    # DATABASE_URL: postgres://user:pass@db:5432/kundali
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy (uncomment if you want HTTPS / custom domain)
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - kundali
