kind = "web"
previewPath = "/"
title = "Janam Kundali"
version = "1.0.0"
id = "artifacts/kundali"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22100

[services.development]
run = "pnpm --filter @workspace/kundali run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kundali", "run", "build" ]
publicDir = "artifacts/kundali/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22100"
BASE_PATH = "/"
